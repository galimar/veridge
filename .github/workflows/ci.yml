name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: lint + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (dev + treesitter extra)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,treesitter]"
      - name: Lint (ruff)
        run: ruff check veridge tests
      - name: Test (pytest)
        run: pytest -q

  core-no-extra:
    name: core runs with zero runtime deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install core only (no treesitter)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Test (treesitter tests skip cleanly)
        run: pytest -q
