name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"   # weekly: catch advisories published after the last commit

permissions:
  contents: read

jobs:
  test:
    name: lint + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (dev + treesitter extra)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,treesitter]"
      - name: Lint (ruff)
        run: ruff check veridge tests
      - name: Test (pytest)
        run: pytest -q

  core-no-extra:
    name: core runs with zero runtime deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install core only (no treesitter)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Test (treesitter tests skip cleanly)
        run: pytest -q

  audit:
    name: dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # The core has zero runtime deps; the only real surface is the [treesitter] extra.
      # Freeze exactly that closure (tree-sitter + tree-sitter-language-pack) to a file...
      - name: Resolve veridge's real dependency closure
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[treesitter]"
          pip freeze --exclude-editable > audit-deps.txt
          echo "Auditing:" && cat audit-deps.txt
      # ...then audit just that file with pip-audit run in isolation (pipx), so pip-audit's
      # own dependencies never enter the audited set. --strict fails the build on any known
      # advisory. The report is ours, public and reproducible — not behind a vendor paywall.
      - name: Audit the closure (pip-audit, isolated)
        run: pipx run pip-audit -r audit-deps.txt --strict --desc
