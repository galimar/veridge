<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Veridge — project map</title>
<style>
  :root {
    --bg: #0b0e14; --panel: #131823; --ink: #e6edf3; --muted: #8b98a9;
    --line: #283142; --accent: #4b9fff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--ink);
    font: 13px/1.5 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
  #app { display: flex; height: 100vh; }
  #side { width: 280px; flex: 0 0 280px; background: var(--panel); border-right: 1px solid var(--line);
    padding: 16px; overflow-y: auto; }
  #side h1 { font-size: 15px; margin: 0 0 2px; }
  #side .sub { color: var(--muted); font-size: 12px; margin-bottom: 14px; }
  #search { width: 100%; padding: 7px 9px; background: #0b0e14; border: 1px solid var(--line);
    border-radius: 6px; color: var(--ink); margin-bottom: 12px; }
  #search:focus { outline: none; border-color: var(--accent); }
  .group { margin-bottom: 14px; }
  .group label { display: block; color: var(--muted); font-size: 11px; text-transform: uppercase;
    letter-spacing: .04em; margin-bottom: 6px; }
  .legend-item { display: flex; align-items: center; gap: 8px; padding: 2px 0; cursor: pointer; }
  .legend-item.off { opacity: .35; }
  .dot { width: 11px; height: 11px; border-radius: 50%; flex: 0 0 11px; }
  #detail { border-top: 1px solid var(--line); margin-top: 12px; padding-top: 12px; }
  #detail .title { font-weight: 600; word-break: break-all; }
  #detail .row { color: var(--muted); margin-top: 4px; }
  #detail .conns { margin-top: 8px; max-height: 240px; overflow-y: auto; }
  #detail .conn { font-size: 12px; padding: 2px 0; color: var(--ink); cursor: pointer; word-break: break-all; }
  #detail .conn:hover { color: var(--accent); }
  #detail .edge { color: var(--muted); }
  #stage { flex: 1; position: relative; }
  canvas { display: block; width: 100%; height: 100%; cursor: grab; }
  canvas:active { cursor: grabbing; }
  #hint { position: absolute; bottom: 10px; right: 14px; color: var(--muted); font-size: 11px; }
</style>
</head>
<body>
<div id="app">
  <div id="side">
    <h1 id="proj">project</h1>
    <div class="sub" id="counts"></div>
    <input id="search" placeholder="search nodes…" autocomplete="off">
    <div class="group">
      <label>Node types (click to toggle)</label>
      <div id="legend"></div>
    </div>
    <div id="detail"><div class="row">Click a node to inspect it.</div></div>
  </div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div id="hint">drag to pan · scroll to zoom · drag a node to move it</div>
  </div>
</div>

<script type="application/json" id="data">__VERIDGE_DATA__</script>
<script>
(function () {
  "use strict";
  const DATA = JSON.parse(document.getElementById("data").textContent);
  const COLORS = DATA.nodeColors || {};
  const cv = document.getElementById("cv");
  const ctx = cv.getContext("2d");

  // -- model ----------------------------------------------------------------
  const byId = new Map();
  const nodes = DATA.nodes.map(function (n, i) {
    const a = (2 * Math.PI * i) / DATA.nodes.length;
    const node = { id: n.id, kind: n.kind, label: n.label || n.id, path: n.path,
      deg: n.deg || 0, x: Math.cos(a) * 300 + (i % 7) * 3, y: Math.sin(a) * 300 + (i % 5) * 3,
      vx: 0, vy: 0, fx: null, fy: null };
    byId.set(node.id, node);
    return node;
  });
  const links = DATA.links.map(function (l) {
    return { s: byId.get(l.source), t: byId.get(l.target), type: l.type };
  }).filter(function (l) { return l.s && l.t; });

  const adj = new Map();
  nodes.forEach(function (n) { adj.set(n.id, []); });
  links.forEach(function (l) {
    adj.get(l.s.id).push({ id: l.t.id, type: l.type, dir: "out" });
    adj.get(l.t.id).push({ id: l.s.id, type: l.type, dir: "in" });
  });

  // -- view transform -------------------------------------------------------
  let scale = 1, ox = 0, oy = 0;
  function resize() {
    const r = cv.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    cv.width = r.width * dpr; cv.height = r.height * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    W = r.width; H = r.height;
  }
  let W = 0, H = 0;

  // -- force simulation (dependency-free) -----------------------------------
  let alpha = 1;
  const K_REPEL = 2200, K_SPRING = 0.02, LINK_LEN = 60, CENTER = 0.015;
  function tick() {
    const n = nodes.length;
    for (let i = 0; i < n; i++) {
      const a = nodes[i];
      for (let j = i + 1; j < n; j++) {
        const b = nodes[j];
        let dx = a.x - b.x, dy = a.y - b.y;
        let d2 = dx * dx + dy * dy || 0.01;
        const f = (K_REPEL * alpha) / d2;
        const d = Math.sqrt(d2);
        const fx = (dx / d) * f, fy = (dy / d) * f;
        a.vx += fx; a.vy += fy; b.vx -= fx; b.vy -= fy;
      }
    }
    links.forEach(function (l) {
      let dx = l.t.x - l.s.x, dy = l.t.y - l.s.y;
      const d = Math.sqrt(dx * dx + dy * dy) || 0.01;
      const f = K_SPRING * (d - LINK_LEN) * alpha;
      const fx = (dx / d) * f, fy = (dy / d) * f;
      l.s.vx += fx; l.s.vy += fy; l.t.vx -= fx; l.t.vy -= fy;
    });
    nodes.forEach(function (p) {
      p.vx -= p.x * CENTER * alpha; p.vy -= p.y * CENTER * alpha;
      if (p.fx !== null) { p.x = p.fx; p.y = p.fy; p.vx = 0; p.vy = 0; return; }
      p.vx *= 0.82; p.vy *= 0.82;
      p.x += p.vx; p.y += p.vy;
    });
    alpha *= 0.992;
    if (alpha < 0.02) alpha = 0.02;
  }

  // -- rendering ------------------------------------------------------------
  let hoverId = null, selId = null, query = "";
  const hidden = new Set();   // hidden kinds
  function radius(p) { return 3 + Math.min(9, Math.sqrt(p.deg) * 1.7); }
  function visible(p) { return !hidden.has(p.kind); }
  function matches(p) {
    return query && (p.id.toLowerCase().includes(query) || p.label.toLowerCase().includes(query));
  }
  function toScreen(p) { return [p.x * scale + ox + W / 2, p.y * scale + oy + H / 2]; }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.lineWidth = Math.max(0.5, 0.7 * scale);
    links.forEach(function (l) {
      if (!visible(l.s) || !visible(l.t)) return;
      const [x1, y1] = toScreen(l.s), [x2, y2] = toScreen(l.t);
      const hot = selId && (l.s.id === selId || l.t.id === selId);
      ctx.strokeStyle = hot ? "rgba(75,159,255,.55)" : "rgba(120,135,160,.12)";
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    });
    nodes.forEach(function (p) {
      if (!visible(p)) return;
      const [x, y] = toScreen(p);
      const r = radius(p) * Math.max(0.7, Math.min(1.6, scale));
      const dim = query && !matches(p);
      ctx.globalAlpha = dim ? 0.18 : 1;
      ctx.fillStyle = COLORS[p.kind] || "#9aa4b2";
      ctx.beginPath(); ctx.arc(x, y, r, 0, 2 * Math.PI); ctx.fill();
      if (p.id === selId || p.id === hoverId) {
        ctx.globalAlpha = 1; ctx.strokeStyle = "#fff"; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(x, y, r + 2, 0, 2 * Math.PI); ctx.stroke();
      }
      if ((scale > 1.4 || p.id === hoverId || p.id === selId || matches(p)) && !dim) {
        ctx.globalAlpha = 1; ctx.fillStyle = "#cdd6e0"; ctx.font = "11px ui-sans-serif, sans-serif";
        ctx.fillText(p.label, x + r + 3, y + 3);
      }
    });
    ctx.globalAlpha = 1;
  }

  // -- picking & interaction ------------------------------------------------
  function pick(mx, my) {
    let best = null, bd = 14 * 14;
    for (const p of nodes) {
      if (!visible(p)) continue;
      const [x, y] = toScreen(p);
      const dx = x - mx, dy = y - my, d = dx * dx + dy * dy;
      if (d < bd) { bd = d; best = p; }
    }
    return best;
  }
  let drag = null, panning = false, last = null;
  cv.addEventListener("mousedown", function (e) {
    const p = pick(e.offsetX, e.offsetY);
    if (p) { drag = p; p.fx = p.x; p.fy = p.y; select(p.id); }
    else { panning = true; last = [e.offsetX, e.offsetY]; }
  });
  window.addEventListener("mousemove", function (e) {
    const rect = cv.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    if (drag) {
      drag.fx = (mx - ox - W / 2) / scale; drag.fy = (my - oy - H / 2) / scale;
      alpha = Math.max(alpha, 0.3);
    } else if (panning) {
      ox += mx - last[0]; oy += my - last[1]; last = [mx, my];
    } else {
      const p = pick(mx, my); const id = p ? p.id : null;
      if (id !== hoverId) { hoverId = id; cv.style.cursor = p ? "pointer" : "grab"; }
    }
  });
  window.addEventListener("mouseup", function () {
    if (drag) { drag.fx = null; drag.fy = null; drag = null; }
    panning = false;
  });
  cv.addEventListener("wheel", function (e) {
    e.preventDefault();
    const f = e.deltaY < 0 ? 1.1 : 1 / 1.1;
    const mx = e.offsetX - W / 2, my = e.offsetY - H / 2;
    ox = mx - (mx - ox) * f; oy = my - (my - oy) * f;
    scale *= f;
  }, { passive: false });

  // -- detail panel ---------------------------------------------------------
  function select(id) {
    selId = id;
    const p = byId.get(id);
    const d = document.getElementById("detail");
    if (!p) { d.innerHTML = '<div class="row">Click a node to inspect it.</div>'; return; }
    const conns = (adj.get(id) || []).slice().sort(function (a, b) { return a.dir < b.dir ? 1 : -1; });
    let html = '<div class="title">' + esc(p.label) + '</div>';
    html += '<div class="row">' + esc(p.kind) + (p.path ? ' · ' + esc(p.path) : '') + '</div>';
    html += '<div class="row">degree ' + p.deg + ' · ' + conns.length + ' shown</div>';
    html += '<div class="conns">';
    conns.forEach(function (c) {
      const arrow = c.dir === "out" ? "→" : "←";
      html += '<div class="conn" data-id="' + esc(c.id) + '">'
        + '<span class="edge">' + arrow + ' ' + esc(c.type) + '</span> ' + esc(c.id) + '</div>';
    });
    html += '</div>';
    d.innerHTML = html;
    d.querySelectorAll(".conn").forEach(function (el) {
      el.onclick = function () { select(el.getAttribute("data-id")); centerOn(el.getAttribute("data-id")); };
    });
  }
  function centerOn(id) {
    const p = byId.get(id); if (!p) return;
    ox = -p.x * scale; oy = -p.y * scale;
  }
  function esc(s) {
    return String(s).replace(/[&<>"]/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
    });
  }

  // -- legend & search ------------------------------------------------------
  const kinds = Array.from(new Set(nodes.map(function (n) { return n.kind; }))).sort();
  const legend = document.getElementById("legend");
  kinds.forEach(function (k) {
    const el = document.createElement("div");
    el.className = "legend-item";
    el.innerHTML = '<span class="dot" style="background:' + (COLORS[k] || "#9aa4b2") + '"></span>'
      + k + ' <span style="color:var(--muted);margin-left:auto">'
      + nodes.filter(function (n) { return n.kind === k; }).length + '</span>';
    el.onclick = function () {
      if (hidden.has(k)) hidden.delete(k); else hidden.add(k);
      el.classList.toggle("off", hidden.has(k));
    };
    legend.appendChild(el);
  });
  document.getElementById("search").addEventListener("input", function (e) {
    query = e.target.value.trim().toLowerCase();
  });
  document.getElementById("proj").textContent = DATA.project || "project";
  document.getElementById("counts").textContent =
    nodes.length + " nodes · " + links.length + " links";

  // -- loop -----------------------------------------------------------------
  window.addEventListener("resize", resize);
  resize();
  for (let i = 0; i < 120; i++) tick();   // warm up before first paint
  (function loop() { tick(); draw(); requestAnimationFrame(loop); })();
})();
</script>
</body>
</html>
